version: '3.8'

services:
  gongxi-mail-app:
    image: ghcr.io/arsonist-g/gongxi-mail:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://oauth2api:oauth2api_secret@gongxi-mail-postgres:5432/oauth2api
      - REDIS_URL=redis://gongxi-mail-redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=2h
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      gongxi-mail-postgres:
        condition: service_healthy
      gongxi-mail-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - gongximail_app_logs:/app/server/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  gongxi-mail-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - gongximail_redis_data:/data
    command: redis-server --appendonly yes

  gongxi-mail-postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=oauth2api
      - POSTGRES_PASSWORD=oauth2api_secret
      - POSTGRES_DB=oauth2api
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oauth2api"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - gongximail_postgres_data:/var/lib/postgresql/data

networks:
  app-network:
    driver: bridge

volumes:
  gongximail_app_logs:
  gongximail_redis_data:
  gongximail_postgres_data:
